<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Llega Ya - Entregas</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}
body{background:#0f172a;color:#f1f5f9;min-height:100vh;padding-bottom:80px;}
header{background:#111827;padding:14px 16px;border-bottom:2px solid #f59e0b;position:sticky;top:0;z-index:50;}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.logo-icon{width:48px;height:48px;background:#1d4ed8;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.6rem;}
.logo-text{display:flex;flex-direction:column;}
.logo-text .brand{font-size:1.3rem;font-weight:900;color:#f59e0b;letter-spacing:1px;}
.logo-text .sub{font-size:0.65rem;font-weight:bold;color:#ef4444;letter-spacing:2px;}
.logo-text .phone{font-size:0.75rem;color:#f1f5f9;margin-top:2px;}
.header-info{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
.badge{padding:4px 10px;border-radius:20px;font-size:0.72rem;font-weight:bold;}
.badge-blue{background:#1d4ed8;color:white;}
.badge-yellow{background:#f59e0b;color:black;}
.badge-red{background:#ef4444;color:white;}
.badge-green{background:#10b981;color:white;}
.badge-pedidos{background:#7c3aed;color:white;padding:2px 8px;border-radius:12px;font-size:0.7rem;font-weight:bold;margin-left:6px;vertical-align:middle;}
.fecha{font-size:0.8rem;color:#94a3b8;margin-top:4px;}
.toolbar{display:flex;gap:8px;padding:10px;background:#0f172a;border-bottom:1px solid #334155;position:sticky;top:120px;z-index:49;}
.toolbar button{flex:1;padding:10px 6px;border-radius:8px;border:none;font-weight:bold;font-size:0.8rem;cursor:pointer;color:white;}
.tabs{display:flex;border-bottom:1px solid #334155;background:#111827;position:sticky;top:174px;z-index:48;}
.tab{flex:1;padding:10px;text-align:center;font-size:0.85rem;font-weight:bold;cursor:pointer;border-bottom:3px solid transparent;color:#94a3b8;}
.tab.active{color:#f59e0b;border-bottom-color:#f59e0b;}
.search-bar{padding:10px;background:#0f172a;border-bottom:1px solid #334155;position:sticky;top:218px;z-index:47;}
.search-bar input{width:100%;padding:10px 14px 10px 38px;border-radius:10px;border:1px solid #334155;background:#1e293b;color:#f1f5f9;font-size:0.9rem;outline:none;}
.search-bar input:focus{border-color:#f59e0b;}
.search-wrap{position:relative;}
.search-wrap .lupa{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:1rem;pointer-events:none;}
#list{padding:10px;}
.card{background:#1e293b;border-radius:12px;margin-bottom:12px;border-left:4px solid #1d4ed8;overflow:hidden;}
.card.enviado{border-left-color:#0f766e;opacity:0.8;}
.card.multi{border-left-color:#7c3aed;}
.card-header{padding:12px 14px 4px;}
.card-header .num{font-size:0.8rem;color:#94a3b8;}
.card-header .nombre{font-weight:bold;font-size:1rem;margin-top:2px;}
.card-header .tel{font-size:0.8rem;color:#94a3b8;margin-top:2px;}
.notas-multi{margin-top:6px;border-top:1px solid #334155;padding-top:6px;}
.nota-item{font-size:0.82rem;color:#cbd5e1;padding:2px 0;}
.nota-simple{font-size:0.82rem;color:#cbd5e1;margin-top:4px;}
.card-header .cod{font-size:0.9rem;font-weight:bold;color:#f59e0b;margin-top:4px;}
.card-body{padding:8px 14px 12px;display:flex;flex-direction:column;gap:6px;}
.btn-row{display:flex;gap:6px;}
.btn-sm{flex:1;padding:9px 4px;border-radius:8px;border:none;font-weight:bold;font-size:0.78rem;cursor:pointer;color:white;text-align:center;text-decoration:none;display:inline-block;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;display:none;align-items:center;justify-content:center;padding:20px;}
.overlay.open{display:flex;}
.modal{background:#1e293b;border-radius:16px;padding:24px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;}
.modal h2{margin-bottom:16px;font-size:1.1rem;}
.field{margin-bottom:12px;}
.field label{display:block;font-size:0.8rem;color:#94a3b8;margin-bottom:4px;}
.field input,.field textarea{width:100%;padding:12px;border-radius:8px;border:1px solid #334155;background:#0f172a;color:white;font-size:0.95rem;}
.field textarea{resize:vertical;min-height:80px;}
.modal-btns{display:flex;gap:8px;margin-top:16px;}
.modal-btns button{flex:1;padding:12px;border-radius:8px;border:none;font-weight:bold;cursor:pointer;color:white;font-size:0.9rem;}
.empty{text-align:center;padding:40px 20px;color:#64748b;}
</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-icon">🛵</div>
    <div class="logo-text">
      <span class="brand">Llega YA</span>
      <span class="sub">ENTREGAS RÁPIDAS</span>
      <span class="phone">📱 +1 849-343-8658</span>
    </div>
  </div>
  <div class="fecha" id="fechaDisplay">Sin fecha cargada</div>
  <div class="header-info">
    <span class="badge badge-blue" id="badgeTotal">Total: 0</span>
    <span class="badge badge-green" id="badgeEnviados">Enviados: 0</span>
    <span class="badge badge-yellow" id="badgePendientes">Pendientes: 0</span>
    <span class="badge badge-yellow" id="badgeCodTotal">RD$ 0</span>
    <span class="badge badge-green" id="badgeRecaudado">✅ RD$ 0</span>
    <span class="badge badge-red" id="badgePendCod">⏳ RD$ 0</span>
  </div>
</header>

<div class="toolbar">
  <button style="background:#1d4ed8" onclick="openModal('modalCargar')">📂 Cargar JSON</button>
  <button style="background:#475569" onclick="openModal('modalFecha')">📅 Fecha</button>
  <button style="background:#475569" onclick="openModal('modalConfig')">⚙️</button>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('pendientes')">Pendientes</div>
  <div class="tab" onclick="switchTab('contactados')">Ya Contacté</div>
</div>

<div class="search-bar">
  <div class="search-wrap">
    <span class="lupa">🔍</span>
    <input type="text" id="searchInput" placeholder="Buscar por nombre o teléfono..." oninput="render()">
  </div>
</div>

<div id="list"><div class="empty">Carga un archivo JSON para comenzar</div></div>

<!-- Modal Cargar -->

<div class="overlay" id="modalCargar">
  <div class="modal">
    <h2>📂 Cargar Clientes</h2>
    <div class="field"><label>Selecciona archivo .json</label><input type="file" id="fileInput" accept=".json" onchange="cargarArchivo(event)"></div>
    <div class="field"><label>O pega el JSON aquí</label><textarea id="jsonPaste" placeholder='{ "clientes": [...] }'></textarea></div>
    <div class="modal-btns">
      <button style="background:#10b981" onclick="cargarPegado()">CARGAR</button>
      <button style="background:#334155" onclick="closeModal('modalCargar')">CANCELAR</button>
    </div>
  </div>
</div>

<!-- Modal Config -->

<div class="overlay" id="modalConfig">
  <div class="modal">
    <h2>⚙️ Opciones</h2>
    <br>
    <button style="width:100%;padding:12px;border-radius:8px;border:none;font-weight:bold;cursor:pointer;color:white;background:#ef4444;font-size:0.9rem" onclick="if(confirm('¿Borrar todos los clientes? Esto no se puede deshacer.')){localStorage.removeItem('llegaya_clientes');clientes=[];guardar();closeModal('modalConfig');}">🗑️ Borrar Todo (fin del día)</button>
    <button style="width:100%;padding:12px;border-radius:8px;border:none;font-weight:bold;cursor:pointer;color:white;background:#475569;font-size:0.9rem;margin-top:8px" onclick="closeModal('modalConfig')">CERRAR</button>
  </div>
</div>

<!-- Modal Fecha -->

<div class="overlay" id="modalFecha">
  <div class="modal">
    <h2>📅 Fecha de Entrega</h2>
    <div class="field"><label>Fecha</label><input type="date" id="inputFecha"></div>
    <div class="modal-btns">
      <button style="background:#10b981" onclick="guardarFecha()">GUARDAR</button>
      <button style="background:#334155" onclick="closeModal('modalFecha')">CANCELAR</button>
    </div>
  </div>
</div>

<script>
let clientes = JSON.parse(localStorage.getItem('llegaya_clientes') || '[]');
let fecha = localStorage.getItem('llegaya_fecha') || '';
let tabActual = 'pendientes';

function generarId() {
  return Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
}

function normTel(tel) {
  return (tel || '').replace(/\D/g, '');
}

clientes = clientes.map(c => c._uid ? c : { ...c, _uid: generarId() });

const variantesUbicacion = [
  (nombre1, tratamiento) =>
    `%C2%A1Hola%20${encodeURIComponent(nombre1)}!%20%F0%9F%91%8B%20Le%20contacta%20*Llega%20Ya*.%0A%0ASu%20pedido%20est%C3%A1%20listo%20y%20nuestro%20motorista%20est%C3%A1%20en%20espera%20para%20salir%20en%20cuanto%20recibamos%20su%20ubicaci%C3%B3n.%20%F0%9F%9B%B5%0A%0APor%20favor%20comp%C3%A1rtanos%20su%20*ubicaci%C3%B3n%20actual*%20por%20aqu%C3%AD.%20%F0%9F%93%8D%20Solo%20toca%20el%20clip%20%F0%9F%93%8E%20%E2%86%92%20Ubicaci%C3%B3n%20y%20listo.%0A%0A%C2%A1Gracias%20y%20en%20breve%20estamos%20con%20usted!%20%F0%9F%98%8A`,
  (nombre1, tratamiento) =>
    `%C2%A1Buenas!%20%F0%9F%8C%9F%20Le%20saluda%20el%20equipo%20de%20*Llega%20Ya*.%0A%0A${encodeURIComponent(tratamiento)}%20${encodeURIComponent(nombre1)}%2C%20su%20pedido%20est%C3%A1%20listo%20y%20nuestro%20motorista%20est%C3%A1%20pendiente%20para%20hacer%20la%20entrega.%0A%0ASolo%20necesitamos%20que%20nos%20comparta%20su%20*ubicaci%C3%B3n%20en%20este%20momento*%20para%20llegar%20donde%20usted%20est%C3%A1%20lo%20m%C3%A1s%20r%C3%A1pido%20posible.%20%F0%9F%93%A6%F0%9F%93%8D%0A%0A%C2%A1Muchas%20gracias%20por%20su%20colaboraci%C3%B3n!`,
  (nombre1, tratamiento) =>
    `${encodeURIComponent(tratamiento)}%2Fa%20${encodeURIComponent(nombre1)}%2C%20buen%20d%C3%ADa%20%F0%9F%99%8F%0A%0ADesde%20*Llega%20Ya*%20le%20recordamos%20que%20su%20pedido%20est%C3%A1%20pr%C3%B3ximo%20a%20ser%20entregado.%0A%0APara%20completar%20su%20entrega%20sin%20inconvenientes%2C%20por%20favor%20comp%C3%A1rtanos%20su%20*ubicaci%C3%B3n%20actual*%20haciendo%20clic%20en%20el%20clip%20%F0%9F%93%8E%20de%20WhatsApp%20%E2%86%92%20Ubicaci%C3%B3n.%0A%0A%C2%A1Gracias%20y%20que%20tenga%20un%20excelente%20d%C3%ADa!%20%F0%9F%98%8A`
];

const variantesUltimoAviso = [
  (nombre1, tratamiento) =>
    `${encodeURIComponent(tratamiento)}%20${encodeURIComponent(nombre1)}%2C%20buen%20d%C3%ADa.%20%F0%9F%99%8F%0A%0ALe%20contactamos%20una%20vez%20m%C3%A1s%20desde%20*Llega%20Ya*%20con%20respecto%20a%20su%20pedido%2C%20el%20cual%20sigue%20en%20espera%20de%20ser%20entregado.%0A%0ALamentablemente%2C%20si%20no%20recibimos%20respuesta%20de%20su%20parte%20el%20d%C3%ADa%20de%20hoy%2C%20este%20ser%C3%A1%20nuestro%20*%C3%BAltimo%20intento%20de%20contacto*%20y%20el%20pedido%20ser%C3%A1%20devuelto%20al%20remitente.%0A%0AQuedamos%20atentos%20y%20a%20su%20disposici%C3%B3n.%20Gracias%20por%20su%20comprensi%C3%B3n.%20%F0%9F%93%A6`,
  (nombre1, tratamiento) =>
    `%C2%A1Buenas!%20Le%20escribe%20el%20equipo%20de%20*Llega%20Ya*.%20%F0%9F%9B%B5%0A%0A${encodeURIComponent(tratamiento)}%20${encodeURIComponent(nombre1)}%2C%20hemos%20intentado%20comunicarnos%20con%20usted%20en%20varias%20ocasiones%20para%20coordinar%20la%20entrega%20de%20su%20pedido%20sin%20%C3%A9xito.%0A%0AEste%20mensaje%20es%20un%20*aviso%20final*%3A%20si%20no%20logramos%20concretar%20la%20entrega%20el%20d%C3%ADa%20de%20hoy%2C%20procederemos%20a%20devolver%20el%20paquete.%0A%0ASi%20a%C3%BAn%20desea%20recibirlo%2C%20por%20favor%20resp%C3%B3ndanos%20a%20la%20brevedad.%20%F0%9F%99%8F%20Le%20agradecemos%20su%20atenci%C3%B3n.`,
  (nombre1, tratamiento) =>
    `${encodeURIComponent(tratamiento)}%2Fa%20${encodeURIComponent(nombre1)}%2C%20%F0%9F%91%8B%0A%0ADesde%20*Llega%20Ya*%20le%20informamos%20que%20su%20pedido%20a%C3%BAn%20se%20encuentra%20pendiente%20de%20entrega%20y%20no%20hemos%20podido%20localizarle.%0A%0AQueremos%20ser%20transparentes%3A%20este%20ser%C3%A1%20nuestro%20*%C3%BAltimo%20intento%20de%20entrega*%20del%20d%C3%ADa.%20De%20no%20recibir%20respuesta%2C%20el%20pedido%20ser%C3%A1%20retornado.%0A%0AAun%20estamos%20a%20tiempo%20%E2%80%94%20con%20gusto%20coordinamos%20si%20nos%20escribe%20ahora.%20%F0%9F%93%A6%F0%9F%99%8F`
];

function getMsgUbicacion(nombre1, tratamiento, idx) {
  return variantesUbicacion[idx % variantesUbicacion.length](nombre1, tratamiento);
}

function getMsgUltimoAviso(nombre1, tratamiento, idx) {
  return variantesUltimoAviso[idx % variantesUltimoAviso.length](nombre1, tratamiento);
}

function switchTab(tab) {
  tabActual = tab;
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', ['pendientes', 'contactados'][i] === tab);
  });
  render();
}

function guardar() {
  localStorage.setItem('llegaya_clientes', JSON.stringify(clientes));
  render();
}

function guardarFecha() {
  fecha = document.getElementById('inputFecha').value;
  localStorage.setItem('llegaya_fecha', fecha);
  closeModal('modalFecha');
  render();
}

function render() {
  const fechaFmt = fecha
    ? new Date(fecha + 'T12:00:00').toLocaleDateString('es-DO', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })
    : 'Sin fecha';
  document.getElementById('fechaDisplay').textContent = '📅 ' + fechaFmt;

  const total = clientes.length;
  const enviados = clientes.filter(c => c.estado === 'enviado').length;
  const entregados = clientes.filter(c => c.estado === 'entregado').length;
  const pendientes = clientes.filter(c => !c.estado || c.estado === 'pendiente').length;

  const calcCod = c => c.pedidos
    ? c.pedidos.reduce((s, p) => s + (parseFloat(p.cod) || 0), 0)
    : (parseFloat(c.cod) || 0);

  const codTotal = clientes.reduce((s, c) => s + calcCod(c), 0);
  const recaudado = clientes.filter(c => c.estado === 'entregado').reduce((s, c) => s + calcCod(c), 0);
  const pendCod = codTotal - recaudado;

  document.getElementById('badgeTotal').textContent = `Total: ${total}`;
  document.getElementById('badgeEnviados').textContent = `Enviados: ${enviados + entregados}`;
  document.getElementById('badgePendientes').textContent = `Pendientes: ${pendientes}`;
  document.getElementById('badgeCodTotal').textContent = `RD$ ${codTotal.toLocaleString()}`;
  document.getElementById('badgeRecaudado').textContent = `✅ RD$ ${recaudado.toLocaleString()}`;
  document.getElementById('badgePendCod').textContent = `⏳ RD$ ${pendCod.toLocaleString()}`;

  const list = document.getElementById('list');
  if (clientes.length === 0) {
    list.innerHTML = '<div class="empty">Carga un archivo JSON para comenzar</div>';
    return;
  }

  let datos = tabActual === 'pendientes'
    ? clientes.filter(c => (!c.estado || c.estado === 'pendiente' || c.estado === 'enviado') && !c.contactado)
    : clientes.filter(c => c.contactado);

  const query = (document.getElementById('searchInput')?.value || '').toLowerCase().trim();
  if (query) {
    datos = datos.filter(c =>
      (c.nombre || '').toLowerCase().includes(query) ||
      (c.telefono || '').replace(/\D/g, '').includes(query.replace(/\D/g, ''))
    );
  }

  if (datos.length === 0) {
    list.innerHTML = '<div class="empty">No se encontraron clientes</div>';
    return;
  }

  list.innerHTML = datos.map((c) => {
    const idx = clientes.indexOf(c);
    const nombre1 = (c.nombre || '').split(' ')[0];
    const esFemenino = ['a', 'ia', 'na', 'ra', 'la', 'da', 'sa', 'ca'].some(s => nombre1.toLowerCase().endsWith(s));
    const tratamiento = esFemenino ? 'Estimada' : 'Estimado';
    const fechaFmt2 = fecha
      ? new Date(fecha + 'T12:00:00').toLocaleDateString('es-DO', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })
      : '[fecha por confirmar]';

    const esMulti = c.pedidos && c.pedidos.length > 1;

    const pedidosTexto = esMulti
      ? c.pedidos.map((p, i) => `Pedido ${i + 1}: ${p.nota || '—'}`).join('%0A')
      : encodeURIComponent(c.nota || '');

    const msgPrincipal = `Muy buenos días.%0A%0AReciba un cordial saludo de parte de Llega Ya.%0A%0A${tratamiento} ${nombre1},%0A%0AEs un placer confirmarle que su pedido fue procesado y está listo para entrega.%0A%0ADetalle de su pedido:%0A${pedidosTexto}%0A%0ALa entrega está programada para ${encodeURIComponent(fechaFmt2)}.%0A%0ANos encantaría que nos comparta su ubicación para coordinar la entrega. Quedamos atentos a su amable respuesta. 📦`;

    const msgUbicacion = getMsgUbicacion(nombre1, tratamiento, idx);
    const msgUltimo = getMsgUltimoAviso(nombre1, tratamiento, idx);

    const tel = (c.telefono || '').replace(/\D/g, '');
    const waUrl = tel ? `https://wa.me/${tel}?text=${msgPrincipal}` : null;
    const waUbicacion = tel ? `https://wa.me/${tel}?text=${msgUbicacion}` : null;
    const waUltimo = tel ? `https://wa.me/${tel}?text=${msgUltimo}` : null;
    const estado = c.estado || 'pendiente';

    const calcCodLocal = c => c.pedidos
      ? c.pedidos.reduce((s, p) => s + (parseFloat(p.cod) || 0), 0)
      : (parseFloat(c.cod) || 0);
    const codMostrar = calcCodLocal(c);

    let notasHtml = '';
    if (esMulti) {
      notasHtml = `<div class="notas-multi">${c.pedidos.map((p, i) =>
        `<div class="nota-item">📦 <strong>Pedido ${i + 1}:</strong> ${p.nota || '—'}${p.cod ? ` <span style="color:#f59e0b">· RD$ ${parseFloat(p.cod).toLocaleString()}</span>` : ''}</div>`
      ).join('')}</div>`;
    } else if (c.nota) {
      notasHtml = `<div class="nota-simple">📦 ${c.nota}</div>`;
    }

    return `
    <div class="card ${estado !== 'pendiente' ? estado : ''} ${esMulti ? 'multi' : ''}">
      <div class="card-header">
        <div class="num">#${idx + 1}</div>
        <div class="nombre">
          ${c.nombre || 'Sin nombre'}
          ${esMulti ? `<span class="badge-pedidos">📦 ${c.pedidos.length} pedidos</span>` : ''}
        </div>
        <div class="tel">📞 ${c.telefono || '—'}</div>
        ${notasHtml}
        ${codMostrar && !esMulti ? `<div class="cod">💰 RD$ ${codMostrar.toLocaleString()}</div>` : ''}
        ${esMulti ? `<div class="cod">💰 Total: RD$ ${codMostrar.toLocaleString()}</div>` : ''}
      </div>
      <div class="card-body">
        <div class="btn-row">
          ${waUrl ? `<a class="btn-sm" style="background:#25d366" href="${waUrl}" target="_blank">💬 Enviar</a>` : ''}
          ${waUbicacion ? `<a class="btn-sm" style="background:#0e7490" href="${waUbicacion}" target="_blank">📍 Ubicación</a>` : ''}
        </div>
        <div class="btn-row">
          ${waUltimo ? `<a class="btn-sm" style="background:#b91c1c" href="${waUltimo}" target="_blank">⚠️ Último Aviso</a>` : ''}
        </div>
        <div class="btn-row">
          ${c.contactado
            ? `<button class="btn-sm" style="background:#334155" onclick="toggleContactado(${idx})">↩️ Mover a Pendientes</button>`
            : `<button class="btn-sm" style="background:#0f766e" onclick="toggleContactado(${idx})">🔄 Ya Contacté</button>`}
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleContactado(idx) {
  clientes[idx].contactado = !clientes[idx].contactado;
  guardar();
}

function cargarArchivo(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => procesarJSON(ev.target.result);
  reader.readAsText(file);
}

function cargarPegado() {
  const txt = document.getElementById('jsonPaste').value.trim();
  if (!txt) return alert('Pega el JSON primero');
  procesarJSON(txt);
}

function procesarJSON(txt) {
  try {
    const data = JSON.parse(txt);
    let lista = Array.isArray(data) ? data : [...(data.clientes || []), ...(data.sin_ubicacion || [])];

    const mapaArchivo = new Map();
    lista.forEach(n => {
      const tel = normTel(n.telefono);
      const key = tel || ('_sin_tel_' + generarId());
      if (!tel || !mapaArchivo.has(tel)) {
        mapaArchivo.set(key, { ...n, _uid: n._uid || generarId(), estado: n.estado || 'pendiente' });
      } else {
        const base = mapaArchivo.get(tel);
        if (!base.pedidos) {
          base.pedidos = [{ nota: base.nota || '', cod: base.cod || 0 }];
          delete base.nota; delete base.cod;
        }
        base.pedidos.push({ nota: n.nota || '', cod: n.cod || 0 });
      }
    });

    const telExistentes = new Map(
      clientes.filter(c => normTel(c.telefono)).map(c => [normTel(c.telefono), c])
    );

    let agregados = 0, omitidos = 0;

    mapaArchivo.forEach((nuevo, key) => {
      const tel = key.startsWith('_sin_tel_') ? '' : key;
      if (!tel) { clientes.push(nuevo); agregados++; return; }
      if (telExistentes.has(tel)) {
        omitidos++;
      } else {
        clientes.push(nuevo);
        telExistentes.set(tel, nuevo);
        agregados++;
      }
    });

    clientes = clientes.map(c => c._uid ? c : { ...c, _uid: generarId() });
    guardar();
    closeModal('modalCargar');

    let msg = `✅ ${agregados} clientes agregados`;
    if (omitidos > 0) msg += `\n⚠️ ${omitidos} duplicados omitidos`;
    alert(msg);

  } catch (e) { alert('Error: JSON no válido'); }
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.overlay').forEach(o => o.addEventListener('click', e => {
  if (e.target === o) o.classList.remove('open');
}));

render();
</script>
